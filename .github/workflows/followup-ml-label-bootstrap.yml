name: followup-ml-label-bootstrap

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  bootstrap-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure M5 scope labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              {
                name: 'm5-scope',
                color: '0e8a16',
                description: 'Approved in-scope M5 hardening change',
              },
              {
                name: 'm5-expansion-exception',
                color: 'b60205',
                description: 'Approved M5 scope expansion exception',
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  core.info(`Created label: ${label.name}`);
                } else {
                  throw error;
                }
              }
            }
