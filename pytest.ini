# ------------------------
# pytest.ini
# ------------------------
[pytest]
addopts = -q -ra
testpaths = tests

filterwarnings =
    # P0: PyFilesystem2 (fs) imports pkg_resources via declare_namespace on import.
    # The warning is emitted from module "fs", not "pkg_resources".
    ignore:pkg_resources is deprecated as an API.*:UserWarning:fs(\..*)?


    # P1: scikit-learn coordinate descent convergence noise in smoke tests.
    ignore:.*Objective did not converge.*:sklearn.exceptions.ConvergenceWarning
    ignore:.*Duality gap.*:sklearn.exceptions.ConvergenceWarning
